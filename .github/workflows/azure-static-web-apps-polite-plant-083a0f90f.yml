# Azure Static Web Apps CI/CD
#
# We pre-build Next.js static export into `out/`.
# With skip_app_build: true, app_location MUST point at that folder
# (output_location is ignored). See:
# https://learn.microsoft.com/azure/static-web-apps/build-configuration
name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build (static export → out/)
        env:
          BUILD_TARGET: swa
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm ci
          npm run build
          test -f out/index.html || (echo "ERROR: out/index.html missing" && ls -la out && exit 1)
          echo "Artifacts ready:"
          ls -la out | head -25

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string

      - name: Deploy static artifacts
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_PLANT_083A0F90F }}
          action: "upload"
          # Pre-built content root (must contain index.html)
          app_location: "out"
          api_location: ""
          # Ignored when skip_app_build is true — leave empty
          output_location: ""
          skip_app_build: true
          skip_api_build: true
          github_id_token: ${{ steps.idtoken.outputs.result }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_PLANT_083A0F90F }}
          action: "close"
